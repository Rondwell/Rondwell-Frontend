<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" id="theme-color-meta" content="#ffffff" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="msapplication-navbutton-color" content="#ffffff" />

		<!-- Manifest -->
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

		<!-- Favicons -->
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon.png" />

		<!-- Prevent flash of unstyled content -->
		<script>
			(function () {
				function getTheme() {
					var stored = localStorage.getItem('theme');
					if (stored && ['light', 'dark', 'system'].indexOf(stored) !== -1) {
						if (stored === 'system') {
							return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
						}
						return stored;
					}
					return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				}

				var theme = getTheme();
				document.documentElement.classList.add(theme);

				// Set initial theme-color based on the current path so the status bar
				// is tinted correctly even before Svelte hydrates
				var path = window.location.pathname;
				var color = '#d1e8f5'; // default
				if (path.startsWith('/vendor')) color = '#d1e8f5';
				else if (path.startsWith('/exhibitor')) color = '#DBD4F1';
				else if (path.startsWith('/speaker')) color = '#d1e8f5';
				else if (path.startsWith('/events/') && path.indexOf('/registration') !== -1) color = '#DDD1E1';
				else if (path.startsWith('/events/')) color = '#DBD4F1';
				else if (path.startsWith('/collections/')) color = '#F4E1D2';
				else if (path.startsWith('/auth')) color = '#ffffff';

				var meta = document.getElementById('theme-color-meta');
				if (meta) meta.setAttribute('content', color);
			})();
		</script>

		%sveltekit.head%

		<!-- Google Identity Services -->
		<script src="https://accounts.google.com/gsi/client" async defer></script>
	</head>

	<body
		data-sveltekit-preload-data="hover"
		class="relative h-full w-full"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
